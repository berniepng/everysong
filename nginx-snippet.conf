# ── EverySOng nginx config snippet ──────────────────────────────────────────
# Add this location block inside your existing demo.bernie.studio server block
# (the one that already handles demo.bernie.studio with SSL)
#
# File location: /etc/nginx/sites-available/demo.bernie.studio
# After editing: sudo nginx -t && sudo systemctl reload nginx

    # EverySOng app
    location /everysong {
        proxy_pass         http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;

        # Cache static assets at nginx level
        location ~* ^/everysong/public/.*\.(css|js|png|jpg|webp|ico|woff2)$ {
            proxy_pass http://127.0.0.1:3010;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }
